name: SensESP CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device:
          - esp32
          - esp32c3
        platform:
          - arduino
          - pioarduino
        exclude:
          - platform: arduino
            device: esp32c3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ matrix.platform }}-${{ matrix.device }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-${{ matrix.platform }}-${{ matrix.device }}-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade platformio
      - name: Compile test suites
        run: ci/run-tests.sh
        env:
          CI_DEVICE: ${{ matrix.device }}
          CI_PLATFORM: ${{ matrix.platform }}

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - examples/minimal_app.cpp
          - examples/rpm_counter.cpp
          - examples/ssl_connection.cpp
        platform:
          - pioarduino
        device:
          - esp32
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-build-${{ matrix.platform }}-${{ matrix.device }}-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-build-${{ matrix.platform }}-${{ matrix.device }}-
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install --upgrade platformio
      - name: Run PlatformIO
        run: ci/run-ci.sh
        env:
          PLATFORMIO_CI_SRC: ${{ matrix.example }}
          CI_DEVICE: ${{ matrix.device }}
          CI_PLATFORM: ${{ matrix.platform }}
